<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHead Media - Requests Admin</title>
  <link rel="icon" type="image/png" href="/home/images/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --card: rgba(30, 41, 59, 0.5);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #a855f7;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(circle at 15% 85%, rgba(168, 85, 247, 0.18) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(99, 102, 241, 0.18) 0%, transparent 45%);
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    h1 span { background: linear-gradient(90deg, #c084fc, #f0abfc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .card {
      background: var(--card); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 14px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], input[type=password], input[type=search], textarea {
      width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 0.95rem; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 80px; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .check { display: flex; align-items: center; gap: 8px; margin-top: 14px; cursor: pointer; }
    .check input { width: 16px; height: 16px; accent-color: var(--accent); }
    .check span { font-size: 0.9rem; color: var(--text); }
    button {
      padding: 8px 14px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s, transform 0.05s; color: #fff;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border);
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: linear-gradient(135deg, #9333ea, #c026d3); border: none; }
    button.danger  { background: rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.4); color: #fca5a5; }
    .row-item {
      padding: 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px;
      background: rgba(0,0,0,0.2);
    }
    .row-item .text { font-size: 0.95rem; margin-bottom: 4px; word-break: break-word; }
    .row-item .meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; }
    .results { margin-top: 10px; display: none; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .results.open { display: flex; }
    .result {
      display: flex; align-items: center; gap: 10px; padding: 6px 8px;
      background: rgba(255,255,255,0.04); border: 1px solid transparent; border-radius: 8px; cursor: pointer;
    }
    .result:hover { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.4); }
    .result img { width: 36px; height: 54px; border-radius: 4px; object-fit: cover; background: #222; }
    .result .title { font-size: 0.85rem; font-weight: 600; }
    .result .sub { font-size: 0.7rem; color: var(--muted); margin: 0; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-left: 6px; }
    .badge.movie { background: rgba(59, 130, 246, 0.25); color: #93c5fd; }
    .badge.tv    { background: rgba(16, 185, 129, 0.25); color: #6ee7b7; }
    .matched-card { display: flex; gap: 12px; align-items: flex-start; }
    .matched-card img { width: 44px; height: 66px; border-radius: 6px; object-fit: cover; background: #222; flex-shrink: 0; }
    .matched-card .info { flex: 1; min-width: 0; }
    .matched-card .title { font-size: 0.95rem; font-weight: 600; }
    .matched-card .orig { font-size: 0.75rem; color: var(--muted); font-style: italic; }
    .actions { display: flex; gap: 8px; flex-shrink: 0; flex-direction: column; }
    /* State buttons: one "active" (filled), others outlined. Click switches state. */
    .state-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .state-btn {
      padding: 4px 10px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; border-radius: 6px; border: 1px solid;
      background: transparent; cursor: pointer; color: inherit; transition: background 0.15s;
    }
    .state-btn.pending     { color: #fcd34d; border-color: rgba(252, 211, 77, 0.4); }
    .state-btn.searching   { color: #a5b4fc; border-color: rgba(165, 180, 252, 0.4); }
    .state-btn.uploaded    { color: #6ee7b7; border-color: rgba(110, 231, 183, 0.4); }
    .state-btn.pending:hover     { background: rgba(252, 211, 77, 0.1); }
    .state-btn.searching:hover   { background: rgba(165, 180, 252, 0.1); }
    .state-btn.uploaded:hover    { background: rgba(110, 231, 183, 0.1); }
    .state-btn.active.pending    { background: rgba(252, 211, 77, 0.2);  color: #fde68a; }
    .state-btn.active.searching  { background: rgba(165, 180, 252, 0.2); color: #c7d2fe; }
    .state-btn.active.uploaded   { background: rgba(110, 231, 183, 0.2); color: #a7f3d0; }
    .state-note {
      font-size: 0.75rem; color: var(--muted); font-style: italic;
      max-width: 100%; word-break: break-word;
    }
    .source-chip {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      margin-left: 6px; color: var(--muted); background: rgba(255,255,255,0.06);
    }
    /* Tab bar for the Matched section (Active / Uploaded). */
    .match-tabs {
      display: flex; gap: 4px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .match-tab {
      padding: 8px 16px; background: transparent; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted); font-weight: 600; font-size: 0.9rem;
      cursor: pointer; border-radius: 0;
      display: inline-flex; align-items: center; gap: 8px;
      transition: color 0.15s, border-color 0.15s;
    }
    .match-tab:hover { color: var(--text); background: transparent; }
    .match-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-count {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 700;
      background: rgba(255,255,255,0.08); color: var(--text);
    }
    .match-tab.active .tab-count {
      background: rgba(168, 85, 247, 0.25); color: var(--accent);
    }
    .matched-card img[src=""], .matched-card img:not([src]) {
      background: rgba(255,255,255,0.05);
    }
    .empty { color: var(--muted); font-size: 0.85rem; font-style: italic; padding: 6px 0; }
    .status { font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .status.info { color: var(--muted); }
    /* Toast notifications (top-right, auto-dismiss). Slide+fade in, then out. */
    .toast-container {
      position: fixed; top: 20px; right: 20px; z-index: 1000;
      display: flex; flex-direction: column; gap: 10px;
      max-width: 380px; pointer-events: none;
    }
    .toast {
      padding: 12px 16px; border-radius: 10px;
      background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px);
      border: 1px solid; color: var(--text);
      font-size: 0.9rem; font-weight: 500; line-height: 1.4;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transform: translateX(120%); opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: auto;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast.ok   { border-color: #4ade80; }
    .toast.err  { border-color: #f87171; }
    .toast.info { border-color: rgba(255,255,255,0.25); }
    .links { text-align: center; margin-top: 8px; }
    .links a { color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .links a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="false"></div>

  <div class="wrap">
    <h1><span>Anonymous Requests</span></h1>
    <p class="sub">Match text requests to TMDB so they appear on <a href="/recently-added/" style="color:#c084fc;">akplex.tv/recently-added/</a> once available.</p>

    <!-- Auth (collapsed when a key is remembered) -->
    <div class="card" id="authCard">
      <h2>Authentication</h2>
      <label for="adminKey">Admin key</label>
      <input type="password" id="adminKey" placeholder="X-Admin-Key" autocomplete="off">
      <label class="check"><input type="checkbox" id="rememberKey"><span>Remember on this device</span></label>
      <div class="status info" id="topStatus">Enter your admin key, then click Load.</div>
      <div style="margin-top: 12px;"><button class="primary" id="loadBtn">Load requests</button></div>
    </div>

    <!-- Compact "signed in" indicator (shown when authCard is hidden) -->
    <div class="card" id="authChip" style="display:none; padding: 10px 16px;">
      <div style="display: flex; align-items: center; gap: 12px; font-size: 0.85rem;">
        <span style="color:#4ade80;">●</span>
        <span style="color: var(--muted); flex:1;">Signed in. <span id="topStatusInline" style="margin-left:8px;"></span></span>
        <button id="forgetBtn" style="padding: 6px 10px; font-size: 0.75rem;">Sign out</button>
      </div>
    </div>

    <!-- Seed: paste one title per line to backfill or add manually -->
    <div class="card">
      <h2>Add requests manually</h2>
      <label for="seedBox">One title per line (for backfill, or requests you got via DM/SMS):</label>
      <textarea id="seedBox" placeholder="e.g.&#10;Garfield (2004)&#10;Severance&#10;The Bear"></textarea>
      <div style="margin-top: 12px; display: flex; gap: 8px;">
        <button class="primary" id="seedBtn">Add to Unmatched</button>
        <div class="status info" id="seedStatus" style="flex:1; align-self: center; margin: 0;"></div>
      </div>
    </div>

    <!-- Unmatched -->
    <div class="card">
      <h2>Unmatched (<span id="unmatchedCount">0</span>)</h2>
      <div id="unmatchedList"><div class="empty">Nothing loaded yet.</div></div>
    </div>

    <!-- Matched (tabbed: Active = pending + searching by default, Uploaded = archive) -->
    <div class="card">
      <div class="match-tabs">
        <button class="match-tab active" data-mtab="active">
          Active <span class="tab-count" id="activeCount">0</span>
        </button>
        <button class="match-tab" data-mtab="uploaded">
          Uploaded <span class="tab-count" id="uploadedCount">0</span>
        </button>
      </div>
      <div id="matchedList"><div class="empty">Nothing loaded yet.</div></div>
    </div>

    <div class="links"><a href="/announce/">→ Announcements admin</a> &nbsp;·&nbsp; <a href="/home/">← Home</a></div>
  </div>

  <script>
    const KEY_STORAGE = 'requests_admin_key';
    const el = {
      adminKey:    document.getElementById('adminKey'),
      rememberKey: document.getElementById('rememberKey'),
      topStatus:   document.getElementById('topStatus'),
      topStatusInline: document.getElementById('topStatusInline'),
      loadBtn:     document.getElementById('loadBtn'),
      authCard:    document.getElementById('authCard'),
      authChip:    document.getElementById('authChip'),
      forgetBtn:   document.getElementById('forgetBtn'),
      seedBox:     document.getElementById('seedBox'),
      seedBtn:     document.getElementById('seedBtn'),
      seedStatus:  document.getElementById('seedStatus'),
      unmatched:   document.getElementById('unmatchedList'),
      matched:     document.getElementById('matchedList'),
      unmatchedCount: document.getElementById('unmatchedCount'),
      activeCount: document.getElementById('activeCount'),
      uploadedCount: document.getElementById('uploadedCount'),
      tabs: document.querySelectorAll('.match-tab'),
    };

    // Tab state. 'active' = pending + searching items (the actionable ones).
    // 'uploaded' = archive of completed items. Toggle is client-side: we load
    // everything once and filter from a cached array — no extra API hit.
    let currentMatchTab = 'active';
    let allMatchedCache = [];

    // ── Admin key: load remembered, keep in sync ────────────────────────────
    const saved = localStorage.getItem(KEY_STORAGE);
    if (saved) { el.adminKey.value = saved; el.rememberKey.checked = true; }
    function syncKey() {
      if (el.rememberKey.checked && el.adminKey.value) localStorage.setItem(KEY_STORAGE, el.adminKey.value);
      else localStorage.removeItem(KEY_STORAGE);
    }
    el.adminKey.addEventListener('input', syncKey);
    el.rememberKey.addEventListener('change', syncKey);

    function showAuthed(authed) {
      el.authCard.style.display = authed ? 'none' : '';
      el.authChip.style.display = authed ? '' : 'none';
    }

    el.forgetBtn.addEventListener('click', () => {
      localStorage.removeItem(KEY_STORAGE);
      el.adminKey.value = '';
      el.rememberKey.checked = false;
      showAuthed(false);
      setStatus('Signed out.', 'info');
      renderUnmatched([]);
      clearMatched();
    });

    function setStatus(msg, kind = 'info') {
      el.topStatus.textContent = msg;
      el.topStatus.className = 'status ' + kind;
      el.topStatusInline.textContent = msg;
      el.topStatusInline.style.color = kind === 'err' ? '#f87171' : (kind === 'ok' ? '#4ade80' : '');
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // Toast: ephemeral feedback. kind = 'ok' | 'err' | 'info'. Multiple toasts
    // stack vertically; each fades+slides out after `durationMs`.
    function toast(message, kind = 'info', durationMs = 4000) {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + kind;
      el.textContent = message;
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 350);
      }, durationMs);
    }

    // ── Authenticated fetch helper ──────────────────────────────────────────
    async function apiFetch(path, opts = {}) {
      const key = el.adminKey.value.trim();
      if (!key) throw new Error('Admin key required');
      const headers = { 'X-Admin-Key': key, ...(opts.headers || {}) };
      if (opts.body) headers['Content-Type'] = 'application/json';
      const res = await fetch(path, { ...opts, headers });
      if (res.status === 401) throw new Error('Bad admin key');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ── Rendering ───────────────────────────────────────────────────────────
    function fmtDate(unix) {
      if (!unix) return '';
      const d = new Date(unix * 1000);
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function renderUnmatched(items) {
      el.unmatchedCount.textContent = items.length;
      if (!items.length) {
        el.unmatched.innerHTML = '<div class="empty">No unmatched requests. 🎉</div>';
        return;
      }
      el.unmatched.innerHTML = items.map(r => `
        <div class="row-item" data-id="${r.id}">
          <div class="text">${escapeHtml(r.text)}</div>
          <div class="meta">Received ${fmtDate(r.createdAt)}</div>
          <div class="search-row">
            <input type="search" class="search-input" placeholder="Search TMDB (movie or TV)…" value="${escapeHtml(r.text)}">
            <button class="primary search-btn">Search</button>
            <button class="danger delete-btn" title="Delete request">×</button>
          </div>
          <div class="results"></div>
        </div>
      `).join('');
    }

    // Matched section is purely DOM-driven: appendMatched on a successful match,
    // remove the row on unmatch/delete. Nothing is loaded from the server, so a
    // page reload starts it empty.
    function matchedRows() {
      return el.matched.querySelectorAll('.row-item');
    }
    // Recompute Active / Uploaded counts from the cached items.
    // Called whenever allMatchedCache changes (load, state-button click, etc.).
    function updateTabCounts() {
      let active = 0, uploaded = 0;
      for (const it of allMatchedCache) {
        if (it.state === 'uploaded') uploaded++;
        else active++;  // pending + searching + anything else
      }
      el.activeCount.textContent = active;
      el.uploadedCount.textContent = uploaded;
    }
    function clearMatched() {
      el.matched.innerHTML = '';
    }
    function appendMatched(r, posterUrl) {
      // Compatibility wrapper for the success-path of /match — converts the
      // single text_request shape into the unified item shape renderMatched uses.
      renderMatchedItem({
        source: 'text_request',
        id: r.id,
        tmdbId: r.tmdbId,
        type: r.mediaType,
        title: r.matchedTitle,
        year: r.matchedYear,
        state: 'pending',  // freshly matched
        note: '',
        matched: true,
        text: r.text,
        matchedAt: r.matchedAt,
      }, posterUrl);
    }

    // Render the Matched section, filtered by the currently-selected tab.
    // Pulls from allMatchedCache (set by loadAll) so tab switches are instant.
    function applyMatchTab() {
      const filtered = currentMatchTab === 'uploaded'
        ? allMatchedCache.filter(it => it.state === 'uploaded')
        : allMatchedCache.filter(it => it.state !== 'uploaded');
      el.matched.innerHTML = '';
      if (!filtered.length) {
        const msg = currentMatchTab === 'uploaded'
          ? 'No uploaded items yet.'
          : 'Nothing active — you\'re caught up. 🎉';
        el.matched.innerHTML = `<div class="empty">${msg}</div>`;
      } else {
        // Render newest-matched-first; for Seerr-only items use createdAt.
        const sorted = filtered.slice().sort((a, b) =>
          (b.matchedAt || b.createdAt || 0) - (a.matchedAt || a.createdAt || 0)
        );
        sorted.forEach(it => renderMatchedItem(it, null));
      }
    }

    // Compatibility wrapper kept for legacy callers (the /match success path)
    // that pass us a single item. Just refreshes from server.
    function renderMatched(_items) {
      // _items arg is ignored now — we always use allMatchedCache + applyMatchTab.
      applyMatchTab();
    }

    function renderMatchedItem(it, posterUrl) {
      // Strip the empty-state if it's there from a previous render.
      const empty = el.matched.querySelector('.empty');
      if (empty) empty.remove();

      const node = document.createElement('div');
      node.className = 'row-item matched-card';
      // Data attributes drive the state-button + delete handlers below.
      if (it.id != null) node.dataset.id = it.id;
      node.dataset.tmdb = it.tmdbId || '';
      node.dataset.type = it.type || '';
      node.dataset.source = it.source;

      const isSeerr = it.source === 'seerr';
      const title = it.title || (isSeerr ? `TMDB ${it.tmdbId}` : 'Unknown');
      const yearSpan = it.year ? `<span style="color:var(--muted);font-weight:400;">(${it.year})</span>` : '';
      const badge = it.type ? `<span class="badge ${it.type}">${it.type}</span>` : '';
      const sourceChip = isSeerr ? '<span class="source-chip">Seerr</span>' : '';
      const orig = it.text ? `<div class="orig">From: "${escapeHtml(it.text)}"</div>` : '';
      const meta = isSeerr
        ? `<div class="meta" style="margin-top:4px;">Seerr req · requested ${fmtDate(it.createdAt) || '?'}</div>`
        : `<div class="meta" style="margin-top:4px;">Matched ${fmtDate(it.matchedAt) || '?'}</div>`;

      // State buttons — current state highlighted. Click cycles through.
      const state = it.state || 'pending';
      const noteHtml = (state === 'searching' && it.note)
        ? `<span class="state-note">— ${escapeHtml(it.note)}</span>` : '';

      // Actions column: text_request items can be unmatched/deleted; Seerr-only
      // items can only have state changed (we don't touch Seerr requests here).
      const actions = isSeerr
        ? ''  // no unmatch/delete for Seerr-only items
        : `<button class="unmatch-btn" title="Unmatch (return to Unmatched)">Unmatch</button>
           <button class="danger delete-btn" title="Delete">×</button>`;

      // Prefer the poster URL the API enriched onto the item over the legacy
      // posterUrl arg (used only by the /match success path's appendMatched).
      const finalPoster = it.posterUrl || posterUrl;
      node.innerHTML = `
        ${finalPoster ? `<img src="${finalPoster}" alt="" loading="lazy">` : `<img alt="">`}
        <div class="info">
          <div class="title">${escapeHtml(title)} ${yearSpan} ${badge} ${sourceChip}</div>
          ${orig}
          ${meta}
          <div class="state-row">
            <button class="state-btn pending   ${state === 'pending'   ? 'active' : ''}" data-state="pending">Pending</button>
            <button class="state-btn searching ${state === 'searching' ? 'active' : ''}" data-state="searching">Searching</button>
            <button class="state-btn uploaded  ${state === 'uploaded'  ? 'active' : ''}" data-state="uploaded">Uploaded</button>
            ${noteHtml}
          </div>
        </div>
        <div class="actions">${actions}</div>
      `;
      el.matched.appendChild(node);
    }

    // ── Main load ───────────────────────────────────────────────────────────
    // Pulls the unified admin view: unmatched text_requests, matched
    // text_requests, and Seerr-originated requests not already covered by a
    // text_request entry. Each matched item includes its current `state`
    // (override > Seerr-derived) so the state buttons render correctly.
    async function loadAll() {
      try {
        setStatus('Loading…', 'info');
        const data = await apiFetch('/api/admin/all-requests');
        const items = data.items || [];
        const unmatched = items.filter(it => it.source === 'text_request' && !it.matched);
        const matched = items.filter(it => it.matched);
        // Cache the matched list so tab switches don't re-fetch.
        allMatchedCache = matched;
        renderUnmatched(unmatched);
        updateTabCounts();
        applyMatchTab();
        showAuthed(true);
        setStatus(`Loaded ${unmatched.length} unmatched · ${matched.length} matched.`, 'ok');
      } catch (err) {
        setStatus('Load failed: ' + err.message, 'err');
        if (err.message === 'Bad admin key') showAuthed(false);
      }
    }
    el.loadBtn.addEventListener('click', loadAll);

    // Tab clicks — instant client-side filter, no extra fetch.
    el.tabs.forEach(t => {
      t.addEventListener('click', () => {
        currentMatchTab = t.dataset.mtab;
        el.tabs.forEach(x => x.classList.toggle('active', x === t));
        applyMatchTab();
      });
    });

    el.seedBtn.addEventListener('click', async () => {
      const texts = el.seedBox.value.split('\n').map(s => s.trim()).filter(Boolean);
      if (!texts.length) {
        el.seedStatus.textContent = 'Enter at least one title.'; el.seedStatus.className = 'status err';
        toast('Enter at least one title.', 'err');
        return;
      }
      el.seedStatus.textContent = 'Adding…'; el.seedStatus.className = 'status info';
      try {
        const res = await apiFetch('/api/text-requests', { method: 'POST', body: JSON.stringify({ texts }) });
        el.seedBox.value = '';
        el.seedStatus.textContent = `Added ${res.added.length}.`; el.seedStatus.className = 'status ok';
        toast(`Added ${res.added.length} request${res.added.length === 1 ? '' : 's'} to Unmatched.`, 'ok');
        loadAll();
      } catch (err) {
        el.seedStatus.textContent = 'Add failed: ' + err.message; el.seedStatus.className = 'status err';
        toast('Add failed: ' + err.message, 'err');
      }
    });

    // ── Event delegation: search / pick result / delete / unmatch ───────────
    el.unmatched.addEventListener('click', async (e) => {
      const row = e.target.closest('.row-item');
      if (!row) return;
      const id = parseInt(row.dataset.id, 10);

      if (e.target.classList.contains('search-btn')) {
        const q = row.querySelector('.search-input').value.trim();
        if (!q) return;
        const resultsEl = row.querySelector('.results');
        resultsEl.classList.add('open');
        resultsEl.innerHTML = '<div class="empty">Searching…</div>';
        try {
          const data = await apiFetch('/api/text-requests/search?q=' + encodeURIComponent(q));
          const results = data.results || [];
          if (!results.length) { resultsEl.innerHTML = '<div class="empty">No results.</div>'; return; }
          resultsEl.innerHTML = results.map(r => `
            <div class="result" data-tmdb="${r.tmdbId}" data-type="${r.mediaType}" data-title="${escapeHtml(r.title)}" data-year="${r.year || ''}">
              ${r.posterUrl ? `<img src="${r.posterUrl}" alt="">` : `<img alt="">`}
              <div>
                <div class="title">${escapeHtml(r.title)} ${r.year ? `<span style="color:var(--muted);font-weight:400;">(${r.year})</span>` : ''}
                  <span class="badge ${r.mediaType}">${r.mediaType}</span>
                </div>
              </div>
            </div>
          `).join('');
        } catch (err) {
          resultsEl.innerHTML = `<div class="empty" style="color:#f87171;">Search failed: ${escapeHtml(err.message)}</div>`;
          toast('Search failed: ' + err.message, 'err');
        }
      } else if (e.target.classList.contains('delete-btn')) {
        if (!confirm('Delete this request?')) return;
        try {
          await apiFetch(`/api/text-requests/${id}`, { method: 'DELETE' });
          toast('Request deleted.', 'ok');
          loadAll();
        } catch (err) {
          setStatus('Delete failed: ' + err.message, 'err');
          toast('Delete failed: ' + err.message, 'err');
        }
      } else {
        const result = e.target.closest('.result');
        if (!result) return;
        const body = {
          tmdbId: parseInt(result.dataset.tmdb, 10),
          mediaType: result.dataset.type,
          title: result.dataset.title,
          year: result.dataset.year ? parseInt(result.dataset.year, 10) : null,
        };
        const posterImg = result.querySelector('img');
        try {
          const res = await apiFetch(`/api/text-requests/${id}/match`, { method: 'POST', body: JSON.stringify(body) });
          appendMatched(res.request, posterImg?.src || null);
          setStatus(`Matched to "${body.title}".`, 'ok');
          toast(`Matched to "${body.title}"${body.year ? ' (' + body.year + ')' : ''}.`, 'ok');
          loadAll();  // refresh unmatched list (the matched item drops off it)
        } catch (err) {
          setStatus('Match failed: ' + err.message, 'err');
          toast('Match failed: ' + err.message, 'err');
        }
      }
    });

    el.matched.addEventListener('click', async (e) => {
      const row = e.target.closest('.row-item');
      if (!row) return;
      const id = row.dataset.id ? parseInt(row.dataset.id, 10) : null;

      if (e.target.classList.contains('state-btn')) {
        // Cycle to the clicked state. Override is keyed by (tmdbId, type) so
        // it works for both text_request and Seerr-only items.
        const newState = e.target.dataset.state;
        const tmdbId = parseInt(row.dataset.tmdb, 10);
        const type = row.dataset.type;
        if (!tmdbId || !type) {
          toast('Cannot set state: missing tmdbId/type.', 'err');
          return;
        }
        let note = '';
        if (newState === 'searching') {
          // Optional context for searching state — admin can describe what
          // they've tried so far. Skip if blank.
          note = prompt('Optional note (what have you tried? where are you stuck?):', '') || '';
        }
        try {
          await apiFetch('/api/admin/request-state', {
            method: 'POST',
            body: JSON.stringify({ tmdbId, type, state: newState, note }),
          });
          // Update the active class locally for snappy feedback.
          row.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          toast(`Marked as ${newState}.`, 'ok');
          // Reload to pick up the note display + any side-effect.
          loadAll();
        } catch (err) {
          toast('State change failed: ' + err.message, 'err');
        }
        return;
      }

      // Unmatch / Delete only apply to text_request rows.
      if (row.dataset.source !== 'text_request' || id == null) return;

      if (e.target.classList.contains('unmatch-btn')) {
        try {
          await apiFetch(`/api/text-requests/${id}/match`, { method: 'DELETE' });
          row.remove();
          toast('Unmatched — request is back in Unmatched.', 'ok');
          loadAll();
        } catch (err) {
          setStatus('Unmatch failed: ' + err.message, 'err');
          toast('Unmatch failed: ' + err.message, 'err');
        }
      } else if (e.target.classList.contains('delete-btn')) {
        if (!confirm('Delete this request entirely?')) return;
        try {
          await apiFetch(`/api/text-requests/${id}`, { method: 'DELETE' });
          row.remove();
          toast('Request deleted.', 'ok');
          loadAll();  // recompute tab counts now that one is gone
        } catch (err) {
          setStatus('Delete failed: ' + err.message, 'err');
          toast('Delete failed: ' + err.message, 'err');
        }
      }
    });

    // Page starts with empty matched section regardless of server state.
    clearMatched();
    // Auto-load unmatched if we have a remembered key.
    if (saved) loadAll();
  </script>
</body>
</html>
